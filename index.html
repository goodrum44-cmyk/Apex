<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;width:100%}
body{background:#020912;overflow-x:hidden}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:#020912}
::-webkit-scrollbar-thumb{background:#1e2d47;border-radius:2px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}

@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

.loading-bar{background:linear-gradient(90deg,#060f20 25%,#0e1e33 50%,#060f20 75%);background-size:400px 100%;animation:shimmer 1.4s infinite;border-radius:3px;height:14px;margin-bottom:8px}
.ticker-inner{display:flex;animation:ticker 60s linear infinite;width:max-content}
.ticker-inner:hover{animation-play-state:paused}
@media(max-width:768px){.three-col{grid-template-columns:1fr!important}.two-col{grid-template-columns:1fr!important}}
@media(min-width:769px) and (max-width:1024px){.three-col{grid-template-columns:180px 1fr!important}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useCallback}=React;
const ANTHROPIC_API="https://api.anthropic.com/v1/messages";
const MARKET_CONTEXT=`You are APEX, a senior market intelligence AI at a tier-1 investment house.
CURRENT DATA July 3 2026: Fed Rate 3.50-3.75% (Warsh held June 17). Rate hike 20% July FOMC, 100% December. CPI above 4% YoY Iran energy spike. June payrolls +57K vs 115K expected. ISM Mfg 53.3%. GS Risk Appetite 99th percentile. GS SPX target 8000. Q2 earnings growth 23.1% FactSet. SOX down 12% in 2 days. KOSPI down 8%. Meta surged on cloud entry. CoreWeave and Nebius plummeted. Market rotating out of mega-cap tech. PE H1 deal volume down 34% avg size 4x. Dry powder record. Blackstone 25B Pennsylvania infrastructure. Apollo 3.5B xAI compute. BofA rate cuts pushed to mid 2027. Markets closed today reopen Jul 6. Apple earnings Jul 30. FOMC Jul 28-29.
RISKS: Iran escalation, Fed hike sooner, AI valuation reset, PE liquidity crunch.
TAILWINDS: AI infra spend, defense surge, earnings 23%+, broad rotation.
Be direct, data-backed, Goldman Sachs BlackRock style. State probabilities.`;
const TIME_HORIZONS=[
{id:"today",label:"Today",sub:"Jul 3 Holiday",icon:"⚡",color:"#00d4ff"},
{id:"tomorrow",label:"Tomorrow",sub:"Jul 6 Open",icon:"🌅",color:"#7b61ff"},
{id:"thisweek",label:"This Week",sub:"Jul 7-11",icon:"📅",color:"#00ff88"},
{id:"nextweek",label:"Next Week",sub:"Jul 14-18",icon:"🔭",color:"#ff9f00"},
{id:"thismonth",label:"This Month",sub:"July 2026",icon:"📊",color:"#ff4d6d"},
{id:"nextmonth",label:"Next Month",sub:"Aug 2026",icon:"🗓",color:"#c77dff"},
{id:"thisqtr",label:"This Qtr",sub:"Q3 2026",icon:"📈",color:"#06d6a0"},
{id:"nextqtr",label:"Next Qtr",sub:"Q4 2026",icon:"🏦",color:"#ffd166"},
{id:"year",label:"Full Year",sub:"2026 Outlook",icon:"🌐",color:"#ef476f"},

const LENSES=[
{id:"macro",label:"Macro",icon:"🏛"},
{id:"labor",label:"Labor",icon:"👷"},
{id:"pe",label:"PE/M&A",icon:"💼"},

{id:"sector",label:"Sectors",icon:"🏭"},

const TICKERS=[

{sym:"NDX",val:"20,447",chg:"-1.21%",up:false},
{sym:"DJI",val:"42,912",chg:"+0.76%",up:true},
{sym:"VIX",val:"18.4",chg:"+2.1",up:false},
{sym:"10YR",val:"4.38%",chg:"+3bp",up:false},
{sym:"OIL",val:"$68.4",chg:"-0.8%",up:true},
{sym:"GOLD",val:"$3,142",chg:"+0.3%",up:true},
{sym:"SOX",val:"5,114",chg:"-7.2%",up:false},
{sym:"FED",val:"3.625%",chg:"HOLD",up:true},
];
const MACRO_ROWS=[
{label:"Fed Rate",val:"3.50-3.75%",color:"#ffd166"},
{label:"CPI YoY",val:">4.0%",color:"#ef476f"},
{label:"Payrolls",val:"+57K miss",color:"#ef476f"},
{label:"ISM Mfg",val:"53.3",color:"#06d6a0"},

];
const SC={BULLISH:"#06d6a0",CAUTIOUS:"#ffd166",BEARISH:"#ef476f",NEUTRAL:"#8ba0c4"};
function buildPrompt(hz,ln){
const hl={today:"TODAY Jul 3 2026 markets closed",tomorrow:"TOMORROW Jul 6 2026 first day back",thisweek:"THIS WEEK Jul 7-11 2026",nextweek:"NEXT WEEK Jul 14-18 2026",thismonth:"THIS MONTH July 2026",nextmonth:"NEXT MONTH August 2026",thisqtr:"THIS QUARTER Q3 2026",nextqtr:"NEXT QUARTER Q4 2026",year:"FULL YEAR 2026 OUTLOOK"};
const lf=ln?`FOCUS: Emphasize ${ln.toUpperCase()} lens.`:"";
return `${MARKET_CONTEXT}\n${lf}\nBrief for: ${hl[hz]}\n\nUse EXACTLY these headers:\n## SIGNAL: [BULLISH or CAUTIOUS or BEARISH or NEUTRAL]\n## CONVICTION: [number]%\n## HEADLINE\n[one sentence]\n## KEY DRIVERS\n🟢 [bullish]\n🔴 [bearish]\n🟡 [mixed]\n## PROBABILITY SCENARIOS\n🎯 BASE CASE (XX%): [description]\n⬆️ BULL CASE (XX%): [description]\n⬇️ BEAR CASE (XX%): [description]\n## WATCH LIST\n1. [item]\n2. [item]\n3. [item]\n## PE INTEL\n[1-2 sentences]\n## TACTICAL CALL\n[one sentence]\nBe surgical. Goldman Sachs meets BlackRock.`;
}
function parse(t){
if(!t)return null;
const g=(lbl)=>{const r=new RegExp(`## ${lbl}[^\\n]*\\n([\\s\\S]*?)(?=\\n## |$)`,"i");const m=t.match(r);return m?m[1].trim():"";};
const s=t.match(/## SIGNAL:\s*([A-Z]+)/i);
const c=t.match(/## CONVICTION:\s*(\d+)/i);
return{signal:s?s[1].toUpperCase():"",conviction:c?c[1]:"",headline:g("HEADLINE"),drivers:g("KEY DRIVERS"),scenarios:g("PROBABILITY SCENARIOS"),watchlist:g("WATCH LIST"),peIntel:g("PE INTEL"),tactical:g("TACTICAL CALL")};
}
function Sparkline({data,color}){
const W=72,H=26,mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;
const pts=data.map((v,i)=>`${(i/(data.length-1))*W},${H-((v-mn)/rng)*H}`).join(" ");
const last=pts.split(" ").at(-1).split(",");
return(<svg width={W} height={H} style={{overflow:"visible",display:"block"}}><polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round"/><circle cx={last[0]} cy={last[1]} r="2.5" fill={color}/></svg>);
}
function Gauge({value}){
const angle=-135+(value/100)*270;
const color=value<33?"#ef476f":value<66?"#ffd166":"#06d6a0";
const label=value<33?"FEAR":value<55?"NEUTRAL":value<78?"GREED":"EXTR. GREED";
return(<div style={{textAlign:"center"}}><svg viewBox="0 0 120 70" width="120" height="70"><defs><linearGradient id="gg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stopColor="#ef476f"/><stop offset="50%" stopColor="#ffd166"/><stop offset="100%" stopColor="#06d6a0"/></linearGradient></defs><path d="M8 65 A52 52 0 0 1 112 65" fill="none" stroke="#1e2535" strokeWidth="10" strokeLinecap="round"/><path d="M8 65 A52 52 0 0 1 112 65" fill="none" stroke="url(#gg)" strokeWidth="7" strokeLinecap="round"/><g transform={`translate(60,65) rotate(${angle})`}><line x1="0" y1="0" x2="0" y2="-45" stroke={color} strokeWidth="2" strokeLinecap="round"/><circle r="3.5" fill={color}/></g><text x="60" y="62" textAnchor="middle" fill={color} fontSize="10" fontWeight="800" fontFamily="monospace">{value}</text></svg><div style={{fontSize:8,letterSpacing:2,color,fontWeight:800,fontFamily:"monospace",marginTop:-4}}>{label}</div></div>);
}
function App(){
const[hz,setHz]=useState("tomorrow");
const[ln,setLn]=useState(null);
const[cache,setCache]=useState({});
const[loading,setLoading]=useState(false);
const[error,setError]=useState(null);
const[ts,setTs]=useState(null);
const[menu,setMenu]=useState(false);
const[isMobile,setIsMobile]=useState(window.innerWidth<768);
useEffect(()=>{const h=()=>setIsMobile(window.innerWidth<768);window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);},[]);
const key=hz+"__"+(ln||"all");
const H=TIME_HORIZONS.find(x=>x.id===hz);
const P=parse(cache[key]||"");
const sc=SC[P&&P.signal]||"#8ba0c4";
const go=useCallback(async(force=false)=>{
if(cache[key]&&!force)return;
setLoading(true);setError(null);
try{
const r=await fetch(ANTHROPIC_API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:buildPrompt(hz,ln)}]})});
if(!r.ok)throw new Error("HTTP "+r.status);
const d=await r.json();
const t=(d.content||[]).map(b=>b.text||"").join("");
if(!t)throw new Error("Empty");
setCache(p=>({...p,[key]:t}));
setTs(new Date());
}catch(e){setError(e.message);}
finally{setLoading(false);}
},[hz,ln,key,cache]);
useEffect(()=>{go();},[hz,ln]);
const spx=[5610,5720,5830,5780,5710,5660,5710,5800,5831];
const vix=[12.1,13.4,11.8,14.2,17.1,20.3,18.9,17.2,18.4];
const oil=[82,78,71,65,63,68,70,67,68.4];
const card={background:"#060f20",border:"1px solid #0d1e32",borderRadius:7,padding:14,marginBottom:11};
const lbl={fontSize:8,letterSpacing:3,color:"#2d4060",fontWeight:700,fontFamily:"monospace",marginBottom:7};
const b2={fontSize:12,lineHeight:1.75,color:"#7a90b0",whiteSpace:"pre-wrap"};
const SidebarContent=()=>(<>
<div style={{fontSize:8,letterSpacing:3,color:"#2d4060",fontWeight:700,padding:"13px 12px 6px",fontFamily:"monospace"}}>TIME HORIZONS</div>
{TIME_HORIZONS.map(hh=>(<button key={hh.id} onClick={()=>{setHz(hh.id);setMenu(false);}} style={{width:"100%",background:hz===hh.id?`${hh.color}14`:"transparent",border:"none",borderLeft:`3px solid ${hz===hh.id?hh.color:"transparent"}`,padding:"9px 12px",cursor:"pointer",textAlign:"left"}}>
<div style={{display:"flex",alignItems:"center",gap:7}}><span style={{fontSize:12}}>{hh.icon}</span><span style={{fontSize:11,fontWeight:700,color:hz===hh.id?hh.color:"#8ba0c4"}}>{hh.label}</span></div>
<div style={{fontSize:8,color:"#2d4060",marginLeft:19,fontFamily:"monospace"}}>{hh.sub}</div>
</button>))}
<div style={{borderTop:"1px solid #0d1e32",margin:"10px 0 8px",padding:"10px 12px 4px"}}>
<div style={{fontSize:8,letterSpacing:3,color:"#2d4060",fontWeight:700,marginBottom:8,fontFamily:"monospace"}}>SIGNAL LENS</div>
<div style={{display:"flex",flexWrap:"wrap",gap:5}}>
{LENSES.map(l=>(<button key={l.id} onClick={()=>setLn(ln===l.id?null:l.id)} style={{padding:"5px 8px",borderRadius:5,border:`1px solid ${ln===l.id?"#7b61ff":"#0d1e32"}`,background:ln===l.id?"#7b61ff18":"transparent",color:ln===l.id?"#7b61ff":"#2d4060",fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:"monospace"}}>{l.icon} {l.label}</button>))}
</div>
</div>
</>);
return(<div style={{minHeight:"100vh",background:"#020912",fontFamily:"Inter,system-ui,sans-serif",color:"#c5d8f0",display:"flex",flexDirection:"column"}}>
<style>{`*{box-sizing:border-box;margin:0;padding:0}::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#1a2a40;border-radius:2px}@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}.fade-up{animation:fadeUp .35s ease forwards}.shim{background:linear-gradient(90deg,#060f20 25%,#0d1e32 50%,#060f20 75%);background-size:300px 100%;animation:shim 1.3s infinite;border-radius:3px;height:11px;margin-bottom:7px}@keyframes shim{0%{background-position:-300px 0}100%{background-position:300px 0}}@keyframes roll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}.roll{display:flex;animation:roll 50s linear infinite;width:max-content}.roll:hover{animation-play-state:paused}button:focus{outline:none}`}</style>
<div style={{height:50,background:"#030c1a",borderBottom:"1px solid #0d1e32",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 14px",flexShrink:0}}>
<div style={{display:"flex",alignItems:"center",gap:10}}>
<button onClick={()=>setMenu(!menu)} style={{background:"transparent",border:"1px solid #1a2a40",borderRadius:5,color:"#8ba0c4",fontSize:15,cursor:"pointer",padding:"3px 8px"}}>☰</button>
<span style={{fontFamily:"monospace",fontWeight:900,fontSize:17,letterSpacing:4,background:"linear-gradient(90deg,#00d4ff,#7b61ff)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>APEX</span>
<span style={{fontSize:9,color:"#2d4060",fontFamily:"monospace",letterSpacing:1}}>MARKET INTELLIGENCE</span>

{ts&&<span style={{fontSize:8,color:"#2d4060",fontFamily:"monospace"}}>UPDATED {ts.toLocaleTimeString()}</span>}

</div>
</div>

{[...TICKERS,...TICKERS].map((t,i)=>(<span key={i} style={{display:"inline-flex",alignItems:"center",gap:5,padding:"0 18px",fontSize:10,fontFamily:"monospace",whiteSpace:"nowrap"}}>
<span style={{color:"#c5d8f0",fontWeight:700}}>{t.sym}</span>
<span style={{color:"#5a7090"}}>{t.val}</span>
<span style={{color:t.up?"#06d6a0":"#ef476f",fontWeight:600}}>{t.chg}</span>

</span>))}
</div>
</div>
<div style={{overflowX:"auto",WebkitOverflowScrolling:"touch",borderBottom:"1px solid #0d1e32",background:"#030c1a",padding:"7px 10px",display:"flex",gap:7,flexShrink:0}}>
{TIME_HORIZONS.map(hh=>(<button key={hh.id} onClick={()=>setHz(hh.id)} style={{flexShrink:0,padding:"5px 12px",borderRadius:20,border:`1px solid ${hz===hh.id?hh.color:"#1a2a40"}`,background:hz===hh.id?`${hh.color}18`:"transparent",color:hz===hh.id?hh.color:"#3d5a7a",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"monospace",whiteSpace:"nowrap"}}>{hh.icon} {hh.label}</button>))}
</div>
<div style={{display:"flex",flex:1,overflow:"hidden",position:"relative"}}>
{menu&&(<div style={{position:"fixed",inset:0,zIndex:200,display:"flex"}}>
<div style={{width:220,background:"#030c1a",borderRight:"1px solid #1a2a40",overflowY:"auto"}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",borderBottom:"1px solid #0d1e32"}}>
<span style={{fontSize:9,color:"#2d4060",fontFamily:"monospace",letterSpacing:2}}>NAVIGATION</span>
<button onClick={()=>setMenu(false)} style={{background:"transparent",border:"none",color:"#8ba0c4",fontSize:18,cursor:"pointer"}}>✕</button>

</div>)}
{!isMobile&&<div style={{width:190,borderRight:"1px solid #0d1e32",background:"#030c1a",overflowY:"auto",flexShrink:0}}><SidebarContent/></div>}
<div style={{flex:1,overflowY:"auto",padding:isMobile?12:18}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
<div>
<div style={{fontSize:8,letterSpacing:3,color:"#2d4060",fontFamily:"monospace",marginBottom:4}}>INTELLIGENCE BRIEF · {H?.sub?.toUpperCase()}</div>
<div style={{fontSize:isMobile?17:20,fontWeight:700,color:"#e8f0ff",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
<span style={{color:H?.color}}>{H?.icon}</span>{H?.label} Outlook
{P?.signal&&<span style={{fontSize:10,fontWeight:800,letterSpacing:2,fontFamily:"monospace",padding:"2px 9px",borderRadius:4,border:`1px solid ${sc}`,background:`${sc}18`,color:sc}}>{P.signal}</span>}
</div>
</div>
{P?.conviction&&<div style={{textAlign:"center",flexShrink:0,marginLeft:8}}>
<div style={{fontSize:isMobile?22:28,fontWeight:900,fontFamily:"monospace",color:H?.color,lineHeight:1}}>{P.conviction}%</div>
<div style={{fontSize:7,letterSpacing:2,color:"#2d4060",fontFamily:"monospace"}}>CONVICTION</div>
</div>}
</div>
{loading&&<div style={card}><div style={lbl}>ACQUIRING SIGNAL...</div>{[85,70,90,65,80].map((w,i)=><div key={i} className="shim" style={{width:`${w}%`}}/>)}</div>}
{!loading&&error&&<div style={{...card,border:"1px solid #ef476f40"}}>
<div style={{color:"#ef476f",marginBottom:8}}>{error}</div>
<button onClick={()=>go(true)} style={{padding:"6px 14px",background:"#ef476f18",border:"1px solid #ef476f40",borderRadius:5,color:"#ef476f",fontSize:11,cursor:"pointer",fontFamily:"monospace"}}>Retry</button>
</div>}
{!loading&&P?.headline&&<div className="fade-up">
<div style={card}>
<div style={lbl}>APEX HEADLINE</div>
<div style={{fontSize:isMobile?13:14,fontWeight:600,lineHeight:1.55,color:"#e8f0ff",marginBottom:14}}>{P.headline}</div>
{P.scenarios&&<><div style={lbl}>PROBABILITY SCENARIOS</div><div style={b2}>{P.scenarios}</div></>}
</div>
{P.drivers&&<div style={card}><div style={lbl}>KEY MARKET DRIVERS</div><div style={b2}>{P.drivers}</div></div>}
<div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:11,marginBottom:11}}>
{P.watchlist&&<div style={card}><div style={lbl}>👁 WATCH LIST</div><div style={b2}>{P.watchlist}</div></div>}
{P.peIntel&&<div style={card}><div style={lbl}>💼 PE / M&A INTEL</div><div style={b2}>{P.peIntel}</div></div>}
</div>
{P.tactical&&<div style={card}><div style={lbl}>⚡ TACTICAL CALL</div><div style={{background:"linear-gradient(135deg,#06d6a010,#7b61ff12)",border:"1px solid #06d6a025",borderRadius:6,padding:12,fontSize:12,lineHeight:1.65,color:"#c5d8f0",fontStyle:"italic"}}>{P.tactical}</div></div>}
<div style={card}>
<div style={lbl}>MACRO SNAPSHOT</div>
{MACRO_ROWS.map(m=>(<div key={m.label} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid #0d1e3230"}}>
<span style={{fontSize:9,color:"#2d4060",fontFamily:"monospace"}}>{m.label}</span>
<span style={{fontSize:9,fontWeight:700,color:m.color,fontFamily:"monospace"}}>{m.val}</span>
</div>))}
</div>

<div style={lbl}>UPCOMING CATALYSTS</div>
{CATALYSTS.map((c,i)=>(<div key={i} style={{display:"flex",gap:7,alignItems:"flex-start",padding:"5px 0",borderBottom:"1px solid #0d1e3230"}}>
<div style={{width:5,height:5,borderRadius:"50%",background:c.hot?"#ef476f":"#ffd166",flexShrink:0,marginTop:3}}/>

</div>))}

<div>
<div style={{fontSize:8,color:"#5a7090",fontFamily:"monospace"}}>{t.sym}</div>
<div style={{fontSize:11,fontWeight:700,color:"#e8f0ff",fontFamily:"monospace"}}>{t.val}</div>
