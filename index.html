function buildPrompt(hz,ln){
const hl={today:"TODAY July 4 2026 markets closed - positioning for Monday open",tomorrow:"TOMORROW July 7 2026 first trading day back - gap risk and positioning",thisweek:"THIS WEEK July 7-11 2026 Q2 earnings kickoff ISM Services bank earnings",nextweek:"NEXT WEEK July 14-18 2026 peak bank earnings mid-cycle check retail sales",thismonth:"THIS MONTH July 2026 FOMC July 28-29 Apple earnings July 30 Q2 earnings season",nextmonth:"NEXT MONTH August 2026 CPI print Jackson Hole Q2 earnings wrap seasonal weakness",thisqtr:"THIS QUARTER Q3 2026 July through September Fed path earnings trajectory Iran",nextqtr:"NEXT QUARTER Q4 2026 Fed December hike holiday spending year-end positioning",year:"FULL YEAR 2026 OUTLOOK strategic positioning across all asset classes"};
const lf=ln?`\nSPECIAL FOCUS: Deep dive the ${ln.toUpperCase()} lens with extra specificity.`:"";
return `${CTX}${lf}\n\nTASK: Institutional brief for: ${hl[hz]}\n\nRespond with EXACTLY these headers:\n## SIGNAL: [BULLISH or CAUTIOUS or BEARISH or NEUTRAL]\n## CONVICTION: [number 1-99]%\n## BULL_PROB: [number 1-99]%\n## BEAR_PROB: [number 1-99]%\n## EXPECTED_MOVE: [like +1.2% to -2.8%]\n## HEADLINE\n[one surgical sentence]\n## KEY DRIVERS\n🟢 [bullish with data]\n🔴 [bearish with data]\n🟡 [mixed with data]\n🟢 [additional bullish]\n🔴 [additional bearish]\n## PROBABILITY SCENARIOS\n🎯 BASE CASE (XX%): [outcome with price targets]\n⬆️ BULL CASE (XX%): [outcome with price targets]\n⬇️ BEAR CASE (XX%): [outcome with price targets]\n## WATCH LIST\n1. [specific level/date/threshold]\n2. [specific level/date/threshold]\n3. [specific level/date/threshold]\n## SECTOR ROTATION\n[overweight and underweight with reasoning]\n## PE INTEL\n[2-3 sentences PE/M&A implications]\n## RISK MATRIX\nHIGH: [top risk with probability]\nMEDIUM: [medium risk]\nLOW: [tail risk]\n## TACTICAL CALL\n[one direct specific sentence]\nBe surgical. Goldman Sachs morning note meets BlackRock Investment Institute.`;
}
function parse(t){
if(!t)return null;
const g=(lbl)=>{const r=new RegExp(`## ${lbl}[^\\n]*\\n([\\s\\S]*?)(?=\\n## |$)`,"i");const m=t.match(r);return m?m[1].trim():"";};
const s=t.match(/## SIGNAL:\s*([A-Z]+)/i);
const cv=t.match(/## CONVICTION:\s*(\d+)/i);
const bp=t.match(/## BULL_PROB:\s*(\d+)/i);
const brp=t.match(/## BEAR_PROB:\s*(\d+)/i);
const em=t.match(/## EXPECTED_MOVE:\s*([^\n]+)/i);
return{signal:s?s[1].toUpperCase():"",conviction:cv?parseInt(cv[1]):50,bullProb:bp?parseInt(bp[1]):40,bearProb:brp?parseInt(brp[1]):30,expectedMove:em?em[1].trim():"",headline:g("HEADLINE"),drivers:g("KEY DRIVERS"),scenarios:g("PROBABILITY SCENARIOS"),watchlist:g("WATCH LIST"),sectorRotation:g("SECTOR ROTATION"),peIntel:g("PE INTEL"),riskMatrix:g("RISK MATRIX"),tactical:g("TACTICAL CALL")};
}
const SC={BULLISH:"#06d6a0",CAUTIOUS:"#ffd166",BEARISH:"#ef476f",NEUTRAL:"#8ba0c4"};
function Sparkline({data,color,width=70,height=24}){
const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;
const pts=data.map((v,i)=>`${(i/(data.length-1))*width},${height-((v-mn)/rng)*height}`).join(" ");
const lp=pts.split(" ").at(-1).split(",");
const trend=data[data.length-1]>data[0];
return<svg width={width} height={height} style={{overflow:"visible",display:"block"}}>
<polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round"/>
<circle cx={lp[0]} cy={lp[1]} r="2.5" fill={color}/>
<text x={width-2} y={height/2} textAnchor="end" fontSize="8" fill={trend?"#06d6a0":"#ef476f"} fontFamily="monospace">{trend?"▲":"▼"}</text>
</svg>;
}

</svg>

}

function AccuracyTracker(){
const[history,setHistory]=useState(()=>{try{return JSON.parse(localStorage.getItem("apex_history")||"[]");}catch{return[];}});
const[showAdd,setShowAdd]=useState(false);
const[form,setForm]=useState({horizon:"tomorrow",signal:"BULLISH",result:"correct",note:""});
const save=(entry)=>{
const h=[{...entry,id:Date.now(),timestamp:new Date().toISOString()},...history].slice(0,100);
setHistory(h);localStorage.setItem("apex_history",JSON.stringify(h));setShowAdd(false);
};
const total=history.length;
const correct=history.filter(h=>h.result==="correct").length;
const partial=history.filter(h=>h.result==="partial").length;
const accuracy=total>0?Math.round((correct+partial*0.5)/total*100):0;
const byHorizon=HORIZONS.map(h=>({...h,total:history.filter(x=>x.horizon===h.id).length,correct:history.filter(x=>x.horizon===h.id&&x.result==="correct").length,partial:history.filter(x=>x.horizon===h.id&&x.result==="partial").length})).filter(h=>h.total>0);

</div>
{total>0&&<div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:12}}>
{[{label:"TOTAL",value:total,color:"#c5d8f0"},{label:"ACCURACY",value:accuracy+"%",color:accuracy>65?"#06d6a0":accuracy>45?"#ffd166":"#ef476f"},{label:"CORRECT",value:correct,color:"#06d6a0"},{label:"PARTIAL",value:partial,color:"#ffd166"}].map(s=>(

<div style={{fontSize:7,color:"#2d4060",fontFamily:"monospace",letterSpacing:2}}>{s.label}</div>
</div>))}
</div>}
{byHorizon.length>0&&<div style={{marginBottom:12}}>
