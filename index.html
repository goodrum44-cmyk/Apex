<!DOCTYPE html>
<html lang="en">

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;width:100%}
body{background:#020912;font-family:Inter,system-ui,sans-serif;color:#c5d8f0}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#1a2a40;border-radius:2px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes sh{0%{background-position:-300px 0}100%{background-position:300px 0}}
.sh{background:linear-gradient(90deg,#060f20 25%,#0d1e32 50%,#060f20 75%);background-size:300px 100%;animation:sh 1.3s infinite;border-radius:3px;height:10px;margin-bottom:6px}
@keyframes roll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.roll{display:flex;animation:roll 45s linear infinite;width:max-content}
@keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}.fu{animation:fu .3s ease forwards}
button:focus{outline:none}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useCallback}=React;
const API="https://api.anthropic.com/v1/messages";
const CTX=`You are APEX, a senior market intelligence AI at a tier-1 investment house.
CURRENT DATA July 4 2026: Fed Rate 3.50-3.75% (Warsh held June 17). Rate hike 20% July FOMC, 100% December. CPI above 4% YoY Iran energy spike. June payrolls +57K vs 115K expected. ISM Mfg 53.3%. GS Risk Appetite 99th percentile. GS SPX target 8000. Q2 earnings growth 23.1% FactSet. SOX down 12% in 2 days. KOSPI down 8%. Meta surged on cloud entry. CoreWeave and Nebius plummeted. Market rotating out of mega-cap tech. PE H1 deal volume down 34% avg size 4x. Dry powder record. Blackstone 25B Pennsylvania infrastructure. Apollo 3.5B xAI compute. BofA rate cuts pushed to mid 2027. Markets reopen Jul 7. Apple earnings Jul 30. FOMC Jul 28-29.
RISKS: Iran escalation, Fed hike sooner, AI valuation reset, PE liquidity crunch.
TAILWINDS: AI infra spend, defense surge, earnings 23%+, broad rotation.
Be direct, data-backed, Goldman Sachs BlackRock style. State probabilities.`;
const HORIZONS=[
{id:"today",label:"Today",sub:"Jul 4 Holiday",icon:"⚡",color:"#00d4ff"},
{id:"tomorrow",label:"Tomorrow",sub:"Jul 7 Open",icon:"🌅",color:"#7b61ff"},
{id:"thisweek",label:"This Week",sub:"Jul 7-11",icon:"📅",color:"#00ff88"},
{id:"nextweek",label:"Next Week",sub:"Jul 14-18",icon:"🔭",color:"#ff9f00"},
{id:"thismonth",label:"This Month",sub:"July 2026",icon:"📊",color:"#ff4d6d"},
{id:"nextmonth",label:"Next Month",sub:"Aug 2026",icon:"🗓",color:"#c77dff"},

{id:"sector",label:"Sectors",icon:"🏭"},
{id:"geo",label:"Geo",icon:"🌍"},
];
const TICKERS=[
{s:"SPX",v:"5,831",c:"-0.42%",up:false},{s:"NDX",v:"20,447",c:"-1.21%",up:false},
{s:"DJI",v:"42,912",c:"+0.76%",up:true},{s:"VIX",v:"18.4",c:"+2.1",up:false},
{s:"10YR",v:"4.38%",c:"+3bp",up:false},{s:"OIL",v:"$68.4",c:"-0.8%",up:true},
{s:"GOLD",v:"$3,142",c:"+0.3%",up:true},{s:"SOX",v:"5,114",c:"-7.2%",up:false},
{s:"FED",v:"3.625%",c:"HOLD",up:true},
];
const MACRO=[
{l:"Fed Rate",v:"3.50-3.75%",c:"#ffd166"},
{l:"CPI YoY",v:">4.0%",c:"#ef476f"},
{l:"Payrolls",v:"+57K miss",c:"#ef476f"},
{l:"ISM Mfg",v:"53.3",c:"#06d6a0"},
{l:"PE Dry Powder",v:"Record",c:"#7b61ff"},
{l:"GS SPX Target",v:"8,000",c:"#06d6a0"},
{l:"SOX 2-Day",v:"-12%",c:"#ef476f"},
{l:"Oil WTI",v:"$68.4",c:"#ffd166"},
];
const CATS=[
{d:"Jul 7+",e:"Q2 Earnings Season",hot:true},
{d:"Jul 28-29",e:"FOMC Meeting",hot:true},
{d:"Jul 30",e:"Apple Q2 Earnings",hot:true},
{d:"Aug",e:"CPI Print",hot:true},
{d:"Dec",e:"Fed Hike 100% priced",hot:true},
];
const SC={BULLISH:"#06d6a0",CAUTIOUS:"#ffd166",BEARISH:"#ef476f",NEUTRAL:"#8ba0c4"};
function buildPrompt(hz,ln){
const hl={today:"TODAY Jul 4 2026 markets closed",tomorrow:"TOMORROW Jul 7 2026 first day back",thisweek:"THIS WEEK Jul 7-11 2026",nextweek:"NEXT WEEK Jul 14-18 2026",thismonth:"THIS MONTH July 2026",nextmonth:"NEXT MONTH August 2026",thisqtr:"THIS QUARTER Q3 2026",nextqtr:"NEXT QUARTER Q4 2026",year:"FULL YEAR 2026 OUTLOOK"};
const lf=ln?`FOCUS: Emphasize ${ln.toUpperCase()} lens.`:"";
return `${CTX}\n${lf}\nBrief for: ${hl[hz]}\n\nUse EXACTLY these headers:\n## SIGNAL: [BULLISH or CAUTIOUS or BEARISH or NEUTRAL]\n## CONVICTION: [number]%\n## HEADLINE\n[one sentence]\n## KEY DRIVERS\n🟢 [bullish]\n🔴 [bearish]\n🟡 [mixed]\n## PROBABILITY SCENARIOS\n🎯 BASE CASE (XX%): [description]\n⬆️ BULL CASE (XX%): [description]\n⬇️ BEAR CASE (XX%): [description]\n## WATCH LIST\n1. [item]\n2. [item]\n3. [item]\n## PE INTEL\n[1-2 sentences]\n## TACTICAL CALL\n[one sentence]`;
}
function parse(t){
if(!t)return null;
const g=(lbl)=>{const r=new RegExp(`## ${lbl}[^\\n]*\\n([\\s\\S]*?)(?=\\n## |$)`,"i");const m=t.match(r);return m?m[1].trim():"";};
const s=t.match(/## SIGNAL:\s*([A-Z]+)/i);
const c=t.match(/## CONVICTION:\s*(\d+)/i);
return{signal:s?s[1].toUpperCase():"",conviction:c?c[1]:"",headline:g("HEADLINE"),drivers:g("KEY DRIVERS"),scenarios:g("PROBABILITY SCENARIOS"),watchlist:g("WATCH LIST"),peIntel:g("PE INTEL"),tactical:g("TACTICAL CALL")};
}
function Sparkline({data,color}){
const W=68,H=24,mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;
const pts=data.map((v,i)=>`${(i/(data.length-1))*W},${H-((v-mn)/rng)*H}`).join(" ");
const lp=pts.split(" ").at(-1).split(",");
return<svg width={W} height={H} style={{overflow:"visible",display:"block"}}><polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round"/><circle cx={lp[0]} cy={lp[1]} r="2.5" fill={color}/></svg>;
}
function Gauge({v}){
const a=-135+(v/100)*270,c=v<33?"#ef476f":v<66?"#ffd166":"#06d6a0";
const lb=v<33?"FEAR":v<55?"NEUTRAL":v<78?"GREED":"EXTR GREED";
return<div style={{textAlign:"center"}}><svg viewBox="0 0 110 65" width="110" height="65"><defs><linearGradient id="gg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stopColor="#ef476f"/><stop offset="50%" stopColor="#ffd166"/><stop offset="100%" stopColor="#06d6a0"/></linearGradient></defs><path d="M8 60 A46 46 0 0 1 102 60" fill="none" stroke="#1e2535" strokeWidth="9" strokeLinecap="round"/><path d="M8 60 A46 46 0 0 1 102 60" fill="none" stroke="url(#gg)" strokeWidth="6" strokeLinecap="round"/><g transform={`translate(55,60) rotate(${a})`}><line x1="0" y1="0" x2="0" y2="-40" stroke={c} strokeWidth="2" strokeLinecap="round"/><circle r="3" fill={c}/></g><text x="55" y="57" textAnchor="middle" fill={c} fontSize="9" fontWeight="800" fontFamily="monospace">{v}</text></svg><div style={{fontSize:8,letterSpacing:2,color:c,fontWeight:800,fontFamily:"monospace",marginTop:-4}}>{lb}</div></div>;
}
function KeyEntry({onSave}){
const[k,setK]=useState("");
const[err,setErr]=useState("");
const save=()=>{
if(!k.startsWith("sk-ant-")){setErr("Key must start with sk-ant-");return;}
if(k.length<50){setErr("Key looks too short — copy the full key");return;}
localStorage.setItem("apex_key",k.trim());
onSave(k.trim());
};
return(
<div style={{minHeight:"100vh",background:"#020912",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
<div style={{width:"100%",maxWidth:480,background:"#060f20",border:"1px solid #0d1e32",borderRadius:12,padding:32}}>
<div style={{fontFamily:"monospace",fontWeight:900,fontSize:28,letterSpacing:4,background:"linear-gradient(90deg,#00d4ff,#7b61ff)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:8}}>APEX</div>
<div style={{fontSize:11,color:"#3d5a7a",fontFamily:"monospace",letterSpacing:2,marginBottom:24}}>MARKET INTELLIGENCE SYSTEM</div>
<div style={{fontSize:13,color:"#8ba0c4",marginBottom:20,lineHeight:1.6}}>Enter your Anthropic API key to activate APEX. Your key is stored only in your browser and never sent anywhere except directly to Anthropic.</div>
<div style={{fontSize:10,color:"#3d5a7a",fontFamily:"monospace",letterSpacing:2,marginBottom:8}}>API KEY</div>
<input type="password" value={k} onChange={e=>setK(e.target.value)} onKeyDown={e=>e.key==="Enter"&&save()} placeholder="sk-ant-api03-..." style={{width:"100%",background:"#030c1a",border:"1px solid #1a2a40",borderRadius:6,padding:"10px 12px",color:"#c5d8f0",fontFamily:"monospace",fontSize:12,marginBottom:8,outline:"none"}}/>
{err&&<div style={{color:"#ef476f",fontSize:11,marginBottom:8,fontFamily:"monospace"}}>{err}</div>}
<button onClick={save} style={{width:"100%",padding:"11px",background:"linear-gradient(90deg,#00d4ff20,#7b61ff20)",border:"1px solid #7b61ff",borderRadius:6,color:"#7b61ff",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"monospace",letterSpacing:2,marginBottom:20}}>ACTIVATE APEX →</button>
<div style={{fontSize:10,color:"#2d4060",lineHeight:1.6}}>Get your key at <span style={{color:"#7b61ff"}}>platform.anthropic.com</span> → API Keys → Create Key. Cost: ~$0.01-0.03 per brief.</div>
</div>
</div>
);
}
function App(){
const[apiKey,setApiKey]=useState(()=>localStorage.getItem("apex_key")||"");
const[hz,setHz]=useState("tomorrow");
const[ln,setLn]=useState(null);
const[cache,setCache]=useState({});
const[loading,setLoading]=useState(false);
const[error,setError]=useState(null);
const[ts,setTs]=useState(null);
const[menu,setMenu]=useState(false);
const[isMobile,setIsMobile]=useState(window.innerWidth<768);
useEffect(()=>{const h=()=>setIsMobile(window.innerWidth<768);window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);},[]);
const key=hz+"__"+(ln||"all");
const H=HORIZONS.find(x=>x.id===hz);
const P=parse(cache[key]||"");
const sc=SC[P?.signal]||"#8ba0c4";
const go=useCallback(async(force=false)=>{
if(!apiKey)return;
if(cache[key]&&!force)return;
setLoading(true);setError(null);
try{
const r=await fetch(API,{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:buildPrompt(hz,ln)}]})});
if(!r.ok){const e=await r.json();throw new Error(e.error?.message||"HTTP "+r.status);}
const d=await r.json();
const t=(d.content||[]).map(b=>b.text||"").join("");
if(!t)throw new Error("Empty response");
setCache(p=>({...p,[key]:t}));
setTs(new Date());
}catch(e){
if(e.message.includes("auth")||e.message.includes("key")||e.message.includes("credential")){setError("Invalid API key. Click Change Key to update it.");}
else{setError(e.message);}
}finally{setLoading(false);}
},[hz,ln,key,cache,apiKey]);
useEffect(()=>{if(apiKey)go();},[hz,ln,apiKey]);
if(!apiKey)return <KeyEntry onSave={setApiKey}/>;
const spx=[5610,5720,5830,5780,5710,5660,5710,5800,5831];
const vix=[12.1,13.4,11.8,14.2,17.1,20.3,18.9,17.2,18.4];
const oil=[82,78,71,65,63,68,70,67,68.4];
const card={background:"#060f20",border:"1px solid #0d1e32",borderRadius:7,padding:13,marginBottom:11};
const lbl={fontSize:8,letterSpacing:3,color:"#2d4060",fontWeight:700,fontFamily:"monospace",marginBottom:7};
const b2={fontSize:11,lineHeight:1.75,color:"#7a90b0",whiteSpace:"pre-wrap"};
const SidebarInner=()=>(<>
<div style={{fontSize:8,letterSpacing:3,color:"#2d4060",fontWeight:700,padding:"13px 12px 6px",fontFamily:"monospace"}}>TIME HORIZONS</div>
{HORIZONS.map(hh=>(<button key={hh.id} onClick={()=>{setHz(hh.id);setMenu(false);}} style={{width:"100%",background:hz===hh.id?`${hh.color}14`:"transparent",border:"none",borderLeft:`3px solid ${hz===hh.id?hh.color:"transparent"}`,padding:"9px 12px",cursor:"pointer",textAlign:"left"}}>
<div style={{display:"flex",alignItems:"center",gap:7}}><span style={{fontSize:12}}>{hh.icon}</span><span style={{fontSize:11,fontWeight:700,color:hz===hh.id?hh.color:"#8ba0c4"}}>{hh.label}</span></div>
<div style={{fontSize:8,color:"#2d4060",marginLeft:19,fontFamily:"monospace"}}>{hh.sub}</div>
</button>))}
<div style={{borderTop:"1px solid #0d1e32",margin:"10px 0 8px",padding:"10px 12px 4px"}}>
<div style={{fontSize:8,letterSpacing:3,color:"#2d4060",fontWeight:700,marginBottom:8,fontFamily:"monospace"}}>SIGNAL LENS</div>
<div style={{display:"flex",flexWrap:"wrap",gap:5}}>
{LENSES.map(l=>(<button key={l.id} onClick={()=>setLn(ln===l.id?null:l.id)} style={{padding:"5px 8px",borderRadius:5,border:`1px solid ${ln===l.id?"#7b61ff":"#0d1e32"}`,background:ln===l.id?"#7b61ff18":"transparent",color:ln===l.id?"#7b61ff":"#2d4060",fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:"monospace"}}>{l.icon} {l.label}</button>))}
</div>
</div>
</>);
return(
<div style={{minHeight:"100vh",background:"#020912",display:"flex",flexDirection:"column"}}>
<div style={{height:48,background:"#030c1a",borderBottom:"1px solid #0d1e32",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 14px",flexShrink:0}}>
<div style={{display:"flex",alignItems:"center",gap:10}}>
<button onClick={()=>setMenu(!menu)} style={{background:"transparent",border:"1px solid #1a2a40",borderRadius:5,color:"#8ba0c4",fontSize:15,cursor:"pointer",padding:"3px 8px"}}>☰</button>
<span style={{fontFamily:"monospace",fontWeight:900,fontSize:17,letterSpacing:4,background:"linear-gradient(90deg,#00d4ff,#7b61ff)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>APEX</span>
<span style={{fontSize:9,color:"#2d4060",fontFamily:"monospace",letterSpacing:1}}>MARKET INTELLIGENCE</span>
</div>
<div style={{display:"flex",alignItems:"center",gap:10}}>
{ts&&<span style={{fontSize:8,color:"#2d4060",fontFamily:"monospace"}}>UPDATED {ts.toLocaleTimeString()}</span>}
<button onClick={()=>{localStorage.removeItem("apex_key");setApiKey("");}} title="Change API Key" style={{background:"transparent",border:"1px solid #1a2a40",borderRadius:5,color:"#3d5a7a",fontSize:13,cursor:"pointer",padding:"2px 7px"}}>🔑</button>
<span style={{fontSize:9,letterSpacing:2,color:"#ef476f",border:"1px solid #ef476f50",padding:"2px 6px",borderRadius:3,fontFamily:"monospace",animation:"pulse 2s infinite"}}>● LIVE</span>
</div>
</div>
<div style={{height:28,background:"#050d1a",borderBottom:"1px solid #0d1e32",overflow:"hidden",display:"flex",alignItems:"center",flexShrink:0}}>
<div className="roll">
{[...TICKERS,...TICKERS].map((t,i)=>(<span key={i} style={{display:"inline-flex",alignItems:"center",gap:4,padding:"0 16px",fontSize:10,fontFamily:"monospace",whiteSpace:"nowrap"}}>
<span style={{color:"#c5d8f0",fontWeight:700}}>{t.s}</span><span style={{color:"#5a7090"}}>{t.v}</span><span style={{color:t.up?"#06d6a0":"#ef476f",fontWeight:600}}>{t.c}</span><span style={{color:"#1a2a40",marginLeft:5}}>│</span>
</span>))}
</div>
</div>
<div style={{overflowX:"auto",WebkitOverflowScrolling:"touch",borderBottom:"1px solid #0d1e32",background:"#030c1a",padding:"7px 10px",display:"flex",gap:6,flexShrink:0}}>
{HORIZONS.map(hh=>(<button key={hh.id} onClick={()=>setHz(hh.id)} style={{flexShrink:0,padding:"5px 12px",borderRadius:20,border:`1px solid ${hz===hh.id?hh.color:"#1a2a40"}`,background:hz===hh.id?`${hh.color}18`:"transparent",color:hz===hh.id?hh.color:"#3d5a7a",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"monospace",whiteSpace:"nowrap"}}>{hh.icon} {hh.label}</button>))}
</div>
<div style={{display:"flex",flex:1,overflow:"hidden",position:"relative"}}>
{menu&&(<div style={{position:"fixed",inset:0,zIndex:200,display:"flex"}}>
<div style={{width:220,background:"#030c1a",borderRight:"1px solid #1a2a40",overflowY:"auto"}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",borderBottom:"1px solid #0d1e32"}}>
<span style={{fontSize:9,color:"#2d4060",fontFamily:"monospace",letterSpacing:2}}>NAVIGATION</span>
<button onClick={()=>setMenu(false)} style={{background:"transparent",border:"none",color:"#8ba0c4",fontSize:18,cursor:"pointer"}}>✕</button>
</div>
<SidebarInner/>
</div>
<div style={{flex:1,background:"#00000070"}} onClick={()=>setMenu(false)}/>
</div>)}
{!isMobile&&<div style={{width:190,borderRight:"1px solid #0d1e32",background:"#030c1a",overflowY:"auto",flexShrink:0}}><SidebarInner/></div>}
<div style={{flex:1,overflowY:"auto",padding:isMobile?12:18}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
<div>
<div style={{fontSize:8,letterSpacing:3,color:"#2d4060",fontFamily:"monospace",marginBottom:4}}>INTELLIGENCE BRIEF · {H?.sub?.toUpperCase()}</div>
<div style={{fontSize:isMobile?17:20,fontWeight:700,color:"#e8f0ff",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
<span style={{color:H?.color}}>{H?.icon}</span>{H?.label} Outlook
{P?.signal&&<span style={{fontSize:10,fontWeight:800,letterSpacing:2,fontFamily:"monospace",padding:"2px 9px",borderRadius:4,border:`1px solid ${sc}`,background:`${sc}18`,color:sc}}>{P.signal}</span>}
</div>
</div>
{P?.conviction&&<div style={{textAlign:"center",flexShrink:0,marginLeft:8}}>
<div style={{fontSize:isMobile?22:28,fontWeight:900,fontFamily:"monospace",color:H?.color,lineHeight:1}}>{P.conviction}%</div>
<div style={{fontSize:7,letterSpacing:2,color:"#2d4060",fontFamily:"monospace"}}>CONVICTION</div>
</div>}
</div>
{loading&&<div style={card}><div style={lbl}>ACQUIRING SIGNAL...</div>{[85,70,90,65,80].map((w,i)=><div key={i} className="sh" style={{width:`${w}%`}}/>)}</div>}
{!loading&&error&&<div style={{...card,border:"1px solid #ef476f40"}}>
<div style={{color:"#ef476f",marginBottom:8,fontSize:12}}>{error}</div>
<button onClick={()=>go(true)} style={{padding:"6px 14px",background:"#ef476f18",border:"1px solid #ef476f40",borderRadius:5,color:"#ef476f",fontSize:11,cursor:"pointer",fontFamily:"monospace",marginRight:8}}>Retry</button>
<button onClick={()=>{localStorage.removeItem("apex_key");setApiKey("");}} style={{padding:"6px 14px",background:"#7b61ff18",border:"1px solid #7b61ff40",borderRadius:5,color:"#7b61ff",fontSize:11,cursor:"pointer",fontFamily:"monospace"}}>Change Key</button>
</div>}
{!loading&&P?.headline&&<div className="fu">
<div style={card}>
<div style={lbl}>APEX HEADLINE</div>
<div style={{fontSize:isMobile?13:14,fontWeight:600,lineHeight:1.55,color:"#e8f0ff",marginBottom:14}}>{P.headline}</div>
{P.scenarios&&<><div style={lbl}>PROBABILITY SCENARIOS</div><div style={b2}>{P.scenarios}</div></>}
</div>
{P.drivers&&<div style={card}><div style={lbl}>KEY MARKET DRIVERS</div><div style={b2}>{P.drivers}</div></div>}
<div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:11,marginBottom:11}}>
{P.watchlist&&<div style={card}><div style={lbl}>👁 WATCH LIST</div><div style={b2}>{P.watchlist}</div></div>}
{P.peIntel&&<div style={card}><div style={lbl}>💼 PE / M&A INTEL</div><div style={b2}>{P.peIntel}</div></div>}
</div>
{P.tactical&&<div style={card}><div style={lbl}>⚡ TACTICAL CALL</div><div style={{background:"linear-gradient(135deg,#06d6a010,#7b61ff12)",border:"1px solid #06d6a025",borderRadius:6,padding:12,fontSize:12,lineHeight:1.65,color:"#c5d8f0",fontStyle:"italic"}}>{P.tactical}</div></div>}
<div style={card}><div style={lbl}>MACRO SNAPSHOT</div>
