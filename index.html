function buildPrompt(hz,ln){
  const hl={today:"TODAY July 4 2026 markets closed positioning for Monday open",tomorrow:"TOMORROW July 7 2026 first trading day back gap risk",thisweek:"THIS WEEK July 7-11 2026 Q2 earnings kickoff ISM Services",nextweek:"NEXT WEEK July 14-18 2026 peak bank earnings retail sales",thismonth:"THIS MONTH July 2026 FOMC July 28-29 Apple earnings July 30",nextmonth:"NEXT MONTH August 2026 CPI Jackson Hole seasonal weakness",thisqtr:"THIS QUARTER Q3 2026 July through September",nextqtr:"NEXT QUARTER Q4 2026 Fed December hike year-end positioning",year:"FULL YEAR 2026 OUTLOOK strategic positioning"};
  const lf=ln?`\nSPECIAL FOCUS: Emphasize ${ln.toUpperCase()} lens deeply.`:"";
  return `${CTX}${lf}\n\nTASK: Institutional brief for: ${hl[hz]}\n\nRespond with EXACTLY these headers:\n## SIGNAL: [BULLISH or CAUTIOUS or BEARISH or NEUTRAL]\n## CONVICTION: [1-99]%\n## BULL_PROB: [1-99]%\n## BEAR_PROB: [1-99]%\n## EXPECTED_MOVE: [like +1.2% to -2.8%]\n## HEADLINE\n[one surgical sentence]\n## KEY DRIVERS\n🟢 [bullish with data]\n🔴 [bearish with data]\n🟡 [mixed with data]\n🟢 [additional bullish]\n🔴 [additional bearish]\n## PROBABILITY SCENARIOS\n🎯 BASE CASE (XX%): [outcome with SPX targets]\n⬆️ BULL CASE (XX%): [outcome with SPX targets]\n⬇️ BEAR CASE (XX%): [outcome with SPX targets]\n## WATCH LIST\n1. [specific level/date/threshold]\n2. [specific level/date/threshold]\n3. [specific level/date/threshold]\n## SECTOR ROTATION\n[overweight and underweight with reasoning]\n## PE INTEL\n[2-3 sentences PE/M&A implications]\n## RISK MATRIX\nHIGH: [risk with probability]\nMEDIUM: [risk]\nLOW: [tail risk]\n## TACTICAL CALL\n[one direct sentence]\nBe surgical. Goldman Sachs morning note meets BlackRock.`;
}

function parse(t){
  if(!t)return null;
  const g=(lbl)=>{const r=new RegExp(`## ${lbl}[^\\n]*\\n([\\s\\S]*?)(?=\\n## |$)`,"i");const m=t.match(r);return m?m[1].trim():"";};
  const s=t.match(/## SIGNAL:\s*([A-Z]+)/i);
  const cv=t.match(/## CONVICTION:\s*(\d+)/i);
  const bp=t.match(/## BULL_PROB:\s*(\d+)/i);
  const brp=t.match(/## BEAR_PROB:\s*(\d+)/i);
  const em=t.match(/## EXPECTED_MOVE:\s*([^\n]+)/i);
  return{signal:s?s[1].toUpperCase():"",conviction:cv?parseInt(cv[1]):50,bullProb:bp?parseInt(bp[1]):40,bearProb:brp?parseInt(brp[1]):30,expectedMove:em?em[1].trim():"",headline:g("HEADLINE"),drivers:g("KEY DRIVERS"),scenarios:g("PROBABILITY SCENARIOS"),watchlist:g("WATCH LIST"),sectorRotation:g("SECTOR ROTATION"),peIntel:g("PE INTEL"),riskMatrix:g("RISK MATRIX"),tactical:g("TACTICAL CALL")};
}

function Spark({data,color,w=60,h=28}){
  const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-mn)/rng)*h}`).join(" ");
  const lp=pts.split(" ").at(-1).split(",");
  return<svg width={w} height={h} style={{overflow:"visible"}}>
    <defs><linearGradient id={`sg${color.replace("#","")}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.15"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
    <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round"/>
    <circle cx={lp[0]} cy={lp[1]} r="3" fill={color}/>
  </svg>;
}

    <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>

      <span style={{fontSize:11,fontWeight:700,color}}>{sublabel||value+"%"}</span>
    </div>
    <div style={{height:7,background:"#e2e8f0",borderRadius:4,overflow:"hidden"}}>
      <div style={{height:"100%",width:`${value}%`,background:`linear-gradient(90deg,${color}cc,${color})`,borderRadius:4,transition:"width 1s ease"}}/>
    </div>
  </div>;
}

}

        <div style={{fontSize:10,color:"#94a3b8",fontWeight:700,letterSpacing:1,margin:"12px 0 8px",textTransform:"uppercase"}}>Smart Money</div>
        {SMART_MONEY.slice(0,5).map(p=>{
          const sc=SIG_COLOR[p.signal];
          return<div key={p.id} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 0",borderBottom:"1px solid #f1f5f9"}}>
            <span style={{fontSize:14}}>{p.avatar}</span>
            <div style={{flex:1}}><div style={{fontSize:10,fontWeight:600,color:"#1e293b"}}>{p.name.split(" ").slice(-1)[0]}</div></div>
            <div style={{fontSize:11,fontWeight:700,color:sc}}>{p.signal==="BULLISH"?"▲":p.signal==="BEARISH"?"▼":"◆"}</div>
          </div>;
        })}
        <button onClick={()=>setTab("smartmoney")} style={{width:"100%",padding:"7px",background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:6,color:"#6366f1",fontSize:10,cursor:"pointer",fontWeight:600,marginTop:8}}>View Full Smart Money →</button>
      </div>}
    </div>

    <div style={{background:"white",borderTop:"1px solid #e2e8f0",padding:"6px 16px",display:"flex",justifyContent:"space-between",fontSize:10,color:"#94a3b8",flexShrink:0}}>
      <span>APEX v5.0 · Speculative · Not Investment Advice</span>
      <span>Data: GS · BlackRock · Bloomberg · FactSet · STOCK Act · SEC 13-F</span>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
